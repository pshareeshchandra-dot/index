<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Cars</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family: 'Segoe UI';
}

.navbar { background: rgba(0,0,0,0.7); }

.hero {
    height: 90vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border:none;
    transition:0.3s;
}

.card:hover { transform: scale(1.05); }

.card img {
    height:200px;
    object-fit:cover;
}

.btn-custom {
    background:#00ffc3;
    color:black;
}

section { padding:60px 20px; }

.hidden { display:none; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">🚗 Ultra Cars</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" onclick="showPage('home')">Home</a></li>
<li class="nav-item"><a class="nav-link" onclick="showPage('cars')">Cars</a></li>
<li class="nav-item"><a class="nav-link" onclick="showPage('compare')">Compare</a></li>
<li class="nav-item"><a class="nav-link" onclick="showPage('favorites')">Favorites</a></li>
<li class="nav-item"><a class="nav-link" onclick="showPage('contact')">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- HOME -->
<section id="home" class="hero">
<div>
<h1>Welcome to <span style="color:#00ffc3">Ultra Cars</span></h1>
<p id="quote">Loading car quote...</p>

<input id="username" class="form-control w-50 mx-auto mt-3" placeholder="Enter your name">
<button class="btn btn-custom mt-2" onclick="greet()">Greet</button>
<p id="greetMsg"></p>
</div>
</section>

<!-- CARS -->
<section id="cars" class="container hidden">
<h2 class="text-center">Cars Collection</h2>

<input id="search" class="form-control w-50 mx-auto my-3" placeholder="Search cars">

<div class="row" id="carList"></div>
</section>

<!-- COMPARE -->
<section id="compare" class="container hidden text-center">
<h2>Compare Cars</h2>

<select id="car1" class="form-select w-50 mx-auto mb-2"></select>
<select id="car2" class="form-select w-50 mx-auto mb-2"></select>

<button class="btn btn-custom" onclick="compareCars()">Compare</button>

<div id="compareResult" class="mt-4"></div>
</section>

<!-- FAVORITES -->
<section id="favorites" class="container hidden text-center">
<h2>Favorites</h2>
<ul id="favList" class="list-group"></ul>
</section>

<!-- CONTACT -->
<section id="contact" class="container hidden">
<h2 class="text-center">Contact</h2>

<form id="form" class="w-50 mx-auto">
<input id="name" class="form-control mb-2" placeholder="Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<textarea id="msg" class="form-control mb-2" placeholder="Message"></textarea>
<button class="btn btn-custom w-100">Submit</button>
<p id="formMsg"></p>
</form>
</section>

<script>

// CAR DATA
const cars = [
{name:"Lamborghini", price:500000, img:"https://images.unsplash.com/photo-1544636331-e26879cd4d9b"},
{name:"Ferrari", price:400000, img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
{name:"Bugatti", price:2000000, img:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c"},
{name:"BMW", price:80000, img:"https://images.unsplash.com/photo-1502877338535-766e1452684a"},
{name:"Audi", price:90000, img:"https://images.unsplash.com/photo-1511396275275-86ec3b5d9d4e"},
{name:"Mercedes", price:100000, img:"https://images.unsplash.com/photo-1504215680853-026ed2a45def"}
];

// NAVIGATION
function showPage(page){
document.querySelectorAll("section").forEach(sec=>sec.classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");
}

// DISPLAY CARS
function displayCars(filter=""){
const list=document.getElementById("carList");
list.innerHTML="";

cars.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()))
.forEach(car=>{
let div=document.createElement("div");
div.className="col-md-4 mb-3";

div.innerHTML=`
<div class="card p-2">
<img src="${car.img}">
<h5 class="text-center mt-2">${car.name}</h5>
<p class="text-center">$${car.price}</p>
<button class="btn btn-custom" onclick="addFav('${car.name}')">Favorite</button>
</div>
`;

list.appendChild(div);
});
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
displayCars(e.target.value);
});

// FAVORITES
function addFav(name){
let fav=JSON.parse(localStorage.getItem("fav"))||[];
fav.push(name);
localStorage.setItem("fav",JSON.stringify(fav));
showFav();
}

function showFav(){
let list=document.getElementById("favList");
list.innerHTML="";
let fav=JSON.parse(localStorage.getItem("fav"))||[];

fav.forEach(f=>{
let li=document.createElement("li");
li.className="list-group-item";
li.innerText=f;
list.appendChild(li);
});
}

// COMPARE
function loadCompare(){
let c1=document.getElementById("car1");
let c2=document.getElementById("car2");

cars.forEach(c=>{
c1.innerHTML+=`<option>${c.name}</option>`;
c2.innerHTML+=`<option>${c.name}</option>`;
});
}

function compareCars(){
let c1=document.getElementById("car1").value;
let c2=document.getElementById("car2").value;

let carA=cars.find(c=>c.name===c1);
let carB=cars.find(c=>c.name===c2);

document.getElementById("compareResult").innerHTML=
`${carA.name}: $${carA.price} <br> ${carB.name}: $${carB.price}`;
}

// GREETING
function greet(){
let name=document.getElementById("username").value;
sessionStorage.setItem("user",name);
document.getElementById("greetMsg").innerText=name?`Hello ${name}`:"Hello Guest";
}

// FORM VALIDATION
document.getElementById("form").addEventListener("submit",e=>{
e.preventDefault();

let n=name.value,e1=email.value,m=msg.value;

if(!n||!e1||!m){
formMsg.innerText="All fields required";
formMsg.style.color="red";
return;
}

formMsg.innerText="Submitted!";
formMsg.style.color="lightgreen";
});

// API
fetch("https://api.quotable.io/random")
.then(res=>res.json())
.then(data=>{
quote.innerText=data.content;
});

// INIT
displayCars();
showFav();
loadCompare();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
